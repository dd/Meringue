name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "Test | py${{ matrix.python-version }}-dj${{ matrix.django-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Django 2.2 — oldest boundary
          - python-version: "3.10"
            django-version: "2.2"
            modeltranslation-version: "0.17.0"
            drf-version: "3.13.0"
            drf-simplejwt-version: "5.2.0"
            django_hosts-version: "5.2"
          # Django 4.2 — oldest boundary
          - python-version: "3.10"
            django-version: "4.2"
            modeltranslation-version: "0.19.0"
            drf-version: "3.14.0"
            drf-simplejwt-version: "5.3.0"
            django_hosts-version: "7.0.0"
          # Django 4.2 — newest boundary (mt 0.19.0 — max для Django 4.x; mt 0.20+ требует Django 5.1+)
          - python-version: "3.12"
            django-version: "4.2"
            modeltranslation-version: "0.19.0"
            drf-version: "3.17.1"
            drf-simplejwt-version: "5.5.1"
            django_hosts-version: "7.0.0"
          # Django 5.2 — oldest boundary
          - python-version: "3.10"
            django-version: "5.2"
            modeltranslation-version: "0.19.0"
            drf-version: "3.15.0"
            drf-simplejwt-version: "5.3.0"
            django_hosts-version: "7.0.0"
          # Django 5.2 — newest on Python 3.12
          - python-version: "3.12"
            django-version: "5.2"
            modeltranslation-version: "0.20.3"
            drf-version: "3.17.1"
            drf-simplejwt-version: "5.5.1"
            django_hosts-version: "7.0.0"
          # Django 5.2 — Python 3.13
          - python-version: "3.13"
            django-version: "5.2"
            modeltranslation-version: "0.20.3"
            drf-version: "3.17.1"
            drf-simplejwt-version: "5.5.1"
            django_hosts-version: "7.0.0"
          # Django 6.0 — Python 3.12
          - python-version: "3.12"
            django-version: "6.0"
            modeltranslation-version: "0.20.3"
            drf-version: "3.17.1"
            drf-simplejwt-version: "5.5.1"
            django_hosts-version: "7.0.0"
          # Django 6.0 — Python 3.14
          - python-version: "3.14"
            django-version: "6.0"
            modeltranslation-version: "0.20.3"
            drf-version: "3.17.1"
            drf-simplejwt-version: "5.5.1"
            django_hosts-version: "7.0.0"

    env:
      TEST_NAME: py${{ matrix.python-version }}-${{ matrix.django-version }}-${{ matrix.modeltranslation-version }}-${{ matrix.drf-version }}-${{ matrix.drf-simplejwt-version }}-${{ matrix.django_hosts-version }}

    steps:
      - name: Setup | Checkout Repository
        uses: actions/checkout@v4

      - name: Setup | Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup | Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ env.TEST_NAME }}-${{ hashFiles('pyproject.toml') }}

      - name: Setup | Install Hatch
        uses: pypa/hatch@install

      - name: Setup | Install setuptools for simplejwt <5.3
        if: matrix.drf-simplejwt-version == '5.2.0'
        run: |
          hatch env create mtest.${{ env.TEST_NAME }}
          hatch run mtest.${{ env.TEST_NAME }}:pip install --force-reinstall "setuptools<75"

      - name: Action | Run Tests
        run: |
          COVERAGE_FILE=coverage-${{ env.TEST_NAME }} \
          hatch run mtest.${{ env.TEST_NAME }}:check --cov=meringue

      - name: Action | Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ env.TEST_NAME }}
          path: coverage-${{ env.TEST_NAME }}

  result:
    name: "Result | All tests passed"
    needs: [test]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: All tests passed
        if: ${{ !contains(needs.*.result, 'failure') }}
        run: echo "✅ All tests passed."

      - name: Some tests failed
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          echo "❌ Some tests failed."
          exit 1

  codecov:
    name: Upload coverage to Codecov
    needs: [test]
    runs-on: ubuntu-latest
    if: >-
      always()
      && !contains(needs.*.result, 'failure')
      && contains(fromJSON('["master", "next"]'), github.base_ref || github.ref_name)

    steps:
      - name: Setup | Checkout Repository
        uses: actions/checkout@v4

      - name: Action | Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: coverage-all
          pattern: "coverage-*"
          delete-merged: true

      - name: Action | Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-all
          path: coverage-all

      - name: Setup | Combine coverage
        run: |
          pip install coverage
          coverage combine coverage-all/*

      - name: Publish | Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
